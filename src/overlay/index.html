<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'"
    />
    <title>SkyLand Overlay</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
      }

      .overlay-logo {
        width: 88%;
        height: 88%;
        object-fit: contain;
        opacity: 0.68;
        filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.34));
        user-select: none;
        -webkit-user-drag: none;
      }
    </style>
  </head>
  <body>
    <img src="../renderer/assets/skyland-logo.png" alt="" class="overlay-logo" />
  </body>
</html>
